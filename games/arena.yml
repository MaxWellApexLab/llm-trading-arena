# Flagship head-to-head arena — now the *secondary* game (see games/crypto.yml
# for the 24/7 main stage). A new game = a new file like this one;
# arena/runner.py --game games/<name>.yml

name: arena
description: S&P 100, one decision per trading day, executed at next open.
asset_label: US stocks (S&P 100 only)
execution_desc: at tomorrow's open

universe: sp100          # arena/universe.py resolves this to a ticker list
starting_cash: 100000
max_position_pct: 0.50   # 50% of portfolio in a single name, max
fee_pct: 0            # frictionless — fees are boring
long_only: true
lookback_days: 20        # OHLCV history handed to the model each day
season_length_days: 63   # ~3 trading months (informational only — no auto-reset, see F5c §9.9)
news_source: yahoo_finance

# Every trader below shares one adapter kind (openai_compat) and one key
# (OPENROUTER_API_KEY) — OpenRouter is the single gateway to all six model
# families. model_id picked at construction time from openrouter.ai/models:
# each camp's cheapest ":free" variant if one exists, else that camp's
# cheapest paid model. Re-check periodically; free-tier lineups rotate.
traders:
  - id: gpt
    persona: personas/gpt.md
    kind: openai_compat
    model_id: openai/gpt-oss-20b:free
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    display_name: a current model from the OpenAI family
    risk: high

  - id: claude
    persona: personas/claude.md
    kind: openai_compat
    model_id: anthropic/claude-3-haiku
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    display_name: a current model from the Anthropic family
    risk: medium

  - id: deepseek
    persona: personas/deepseek.md
    kind: openai_compat
    model_id: deepseek/deepseek-v4-flash
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    display_name: a current model from the DeepSeek family
    risk: med-high

  - id: llama
    persona: personas/llama.md
    kind: openai_compat
    model_id: meta-llama/llama-3.1-8b-instruct
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    display_name: a current model from the Meta family
    risk: medium

  - id: gemini
    persona: personas/gemini.md
    kind: openai_compat
    model_id: google/gemini-2.5-flash-lite
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    display_name: a current model from the Google family
    risk: low-med

  - id: qwen
    persona: personas/qwen.md
    kind: openai_compat
    model_id: qwen/qwen-2.5-7b-instruct
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    display_name: a current model from the Qwen family
    risk: medium

# Grok isn't a trader — it's the daily recap commentator (see
# arena/recap.py), called once a day after both games settle rather than
# once per round. Its model id lives in RECAP_MODEL_ID in recap.py.
