# The 24/7 main stage — no market close, so the site can be live any time
# someone lands on it. Two decision rounds a day, weekends included.
# arena/runner.py --game games/crypto.yml

name: crypto
description: BTC/ETH/SOL/XRP/DOGE, two decision rounds a day, every day.
asset_label: crypto (spot, long-only)
execution_desc: at the next round's open (roughly 12 hours from now)

universe: crypto5         # arena/universe.py resolves this to a ticker list
starting_cash: 100000
max_position_pct: 1.00    # no single-position cap — full send is allowed, drama > diversification
fee_pct: 0.001            # 0.1% simulated friction
long_only: true            # spot only, no leverage/derivatives — keeps this uncontroversial
lookback_days: 20          # OHLCV history handed to the model each round
season_length_days: 90     # 90-day season (informational only — no auto-reset, see F5c §9.9)
news_source: crypto_rss    # CoinDesk + Cointelegraph headlines

traders:
  - id: gpt
    persona: personas/gpt.md
    kind: openai_compat
    model_id: openai/gpt-oss-20b:free
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    display_name: a current model from the OpenAI family
    risk: high

  - id: claude
    persona: personas/claude.md
    kind: openai_compat
    model_id: anthropic/claude-3-haiku
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    display_name: a current model from the Anthropic family
    risk: medium

  - id: deepseek
    persona: personas/deepseek.md
    kind: openai_compat
    model_id: deepseek/deepseek-v4-flash
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    display_name: a current model from the DeepSeek family
    risk: med-high

  - id: llama
    persona: personas/llama.md
    kind: openai_compat
    model_id: meta-llama/llama-3.1-8b-instruct
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    display_name: a current model from the Meta family
    risk: medium

  - id: gemini
    persona: personas/gemini.md
    kind: openai_compat
    model_id: google/gemini-2.5-flash-lite
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    display_name: a current model from the Google family
    risk: low-med

  - id: qwen
    persona: personas/qwen.md
    kind: openai_compat
    model_id: qwen/qwen-2.5-7b-instruct
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    display_name: a current model from the Qwen family
    risk: medium

# Grok isn't a trader — it's the daily recap commentator (see
# arena/recap.py), called once a day after both games settle rather than
# once per round. Its model id lives in RECAP_MODEL_ID in recap.py.
