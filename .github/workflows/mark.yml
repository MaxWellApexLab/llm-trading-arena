name: Intraday mark

on:
  schedule:
    - cron: "*/30 * * * *"   # dense NAV samples so the race chart shows a real trend
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: arena-ledger-push

jobs:
  mark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # stdlib only — no pip install, keeps the every-30-min run cheap and fast
      - run: python -m arena.mark

      - name: Commit NAV samples
        run: |
          git config user.name "arena-bot"
          git config user.email "arena-bot@users.noreply.github.com"
          git add data/crypto/ site/data/crypto/
          git diff --cached --quiet && exit 0
          # [CI Skip] stops Cloudflare Pages from burning a build on every sample
          # (free tier = 500 builds/month); the twice-daily round deploys pick
          # the accumulated points up.
          git commit -m "chore: intraday mark $(date -u +%Y-%m-%dT%H:%M) [CI Skip]"
          git pull --rebase --autostash origin main
          git push
