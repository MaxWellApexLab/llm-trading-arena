name: Persona check

on:
  pull_request:
    paths:
      - "personas/**.md"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Validate changed persona files
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          FILES=$(git diff --name-only origin/${{ github.base_ref }} -- 'personas/*.md')
          if [ -z "$FILES" ]; then
            echo "no persona files changed"
            exit 0
          fi
          python scripts/check_personas.py $FILES
