name: Crypto arena run

on:
  schedule:
    - cron: "30 0 * * *"    # 00:30 UTC every day, weekends included
    - cron: "30 12 * * *"   # 12:30 UTC every day, weekends included
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: arena-ledger-push

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run this round's crypto round
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m arena.runner --game crypto

      - name: Sync data into site/ for Pages
        run: |
          mkdir -p site/data/crypto
          cp data/crypto/ledger.json site/data/crypto/ledger.json
          cp data/crypto/commentary.json site/data/crypto/commentary.json
          cp data/crypto/news.json site/data/crypto/news.json || true
          cp data/crypto/events.json site/data/crypto/events.json || true

      - name: Commit updated ledger
        run: |
          git config user.name "arena-bot"
          git config user.email "arena-bot@users.noreply.github.com"
          git add data/crypto/ site/data/crypto/
          git diff --cached --quiet && exit 0
          git commit -m "chore: crypto round $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase --autostash origin main
          git push

  deploy-pages:
    needs: run
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
