name: Weekly card

on:
  schedule:
    - cron: "0 22 * * 5"   # Friday 22:00 UTC, after that day's arena run
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python -m arena.make_card arena
      - run: python -m arena.make_card crypto

      - name: Commit card
        run: |
          git config user.name "arena-bot"
          git config user.email "arena-bot@users.noreply.github.com"
          git add site/cards/
          git diff --cached --quiet || git commit -m "chore: weekly card $(date -u +%F)"
          git push
