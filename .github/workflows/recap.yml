name: Daily recap

on:
  schedule:
    - cron: "0 22 * * *"   # 22:00 UTC, after that day's stocks close (21:30) and both crypto rounds
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: arena-ledger-push

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Generate today's recap
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m arena.recap

      - name: Sync data into site/ for Pages
        run: |
          mkdir -p site/data
          cp data/recap.json site/data/recap.json || true

      - name: Commit recap
        run: |
          git config user.name "arena-bot"
          git config user.email "arena-bot@users.noreply.github.com"
          git add data/recap.json site/data/recap.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: daily recap $(date -u +%F)"
          git pull --rebase --autostash origin main
          git push

  deploy-pages:
    needs: recap
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
