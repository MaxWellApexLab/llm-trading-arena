name: Daily arena run

on:
  schedule:
    - cron: "30 21 * * 1-5"   # 21:30 UTC, Mon-Fri (after US market close)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run today's arena round
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m arena.runner --game arena

      - name: Sync data into site/ for Pages
        run: |
          mkdir -p site/data
          cp data/ledger.json site/data/ledger.json
          cp data/commentary.json site/data/commentary.json

      - name: Commit updated ledger
        run: |
          git config user.name "arena-bot"
          git config user.email "arena-bot@users.noreply.github.com"
          git add data/ledger.json data/commentary.json site/data/ledger.json site/data/commentary.json
          git diff --cached --quiet || git commit -m "chore: daily arena run $(date -u +%F)"
          git push

  deploy-pages:
    needs: run
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
